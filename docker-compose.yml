services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Credentials default to dragonfly_id for local use; override via a root .env to rotate.
    # Must stay in sync with DATABASE_URL below (same variables).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dragonfly_id}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dragonfly_id}
      POSTGRES_DB: ${POSTGRES_DB:-dragonfly_id}
    # Host port 5435: Spotter owns 5432, Plate 5433, Cookbook 5434 on this host.
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dragonfly_id} -d ${POSTGRES_DB:-dragonfly_id}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ./server/.env
    environment:
      # Reach Postgres over the compose network; overrides DATABASE_URL from .env.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dragonfly_id}:${POSTGRES_PASSWORD:-dragonfly_id}@db:5432/${POSTGRES_DB:-dragonfly_id}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILT_AT: ${BUILT_AT:-unknown}
      # F2: the smoke-token subject allowlist (fail-closed). Non-secret required config lives here,
      # not in env_file (compose doesn't re-read a changed env_file on redeploy). Without this the
      # smoke credential could mint an aud="suite" token for any email. Must match each SSO-only
      # app's smoke subject (its scripts/synthetic_smoke.py default) or that app's deploy smoke
      # fails. Space/comma-separated: magpie + remnant (both SSO-only, so both smoke via a suite
      # token rather than a password account).
      SMOKE_SUBJECT_EMAILS: ${SMOKE_SUBJECT_EMAILS:-magpie-smoke@dragonflymedia.org remnant-smoke@dragonflymedia.org}
    depends_on:
      db:
        condition: service_healthy
    # Host port 8004: 8000 Spotter, 8001 Plate, 8002 posterizarr, 8003 Cookbook are taken. The
    # container still listens on 8000 internally, so cloudflared (server:8000) is unaffected.
    ports:
      - "127.0.0.1:8004:8000"

  # Public entrypoint. Only started with: docker compose --profile tunnel up -d
  # Point the Cloudflare public hostname (id.dragonflymedia.org) at http://server:8000.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${TUNNEL_TOKEN:-}
    depends_on:
      - server
    profiles:
      - tunnel
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "localhost:2000", "ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:

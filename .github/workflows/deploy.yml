name: Deploy

# Redeploys the self-hosted dragonfly-id server on a self-hosted GitHub Actions runner (label
# `dragonfly`). The runner long-polls GitHub outbound, so there are no inbound ports to open.
#
# Auto-deploy fires only after Server CI goes green on `main` (workflow_run), so a broken commit
# never ships. workflow_dispatch is a manual button that doubles as a rollback (pass a prior SHA
# in `ref`). Setup notes: deploy/README.md.

on:
  workflow_run:
    workflows: ["Server CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to deploy (default: origin/main). Use a prior SHA to roll back."
        required: false
        default: "origin/main"

concurrency:
  group: dragonfly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Redeploy dragonfly-id
    runs-on: [self-hosted, dragonfly]
    # Auto-deploy only on a push-triggered Server CI success, never the weekly scheduled run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    steps:
      # No actions/checkout: we deploy the canonical clone on the host (vars.DRAGONFLY_DIR), which
      # owns server/.env + the OIDC key + the pgdata volume — not the runner's ephemeral checkout.
      - name: Redeploy
        shell: powershell
        env:
          DRAGONFLY_DIR: ${{ vars.DRAGONFLY_DIR }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          # Runner service = NETWORK SERVICE; the canonical clone is owned by
          # the interactive user, so git needs a safe.directory exception or it
          # fails with "dubious ownership" (bit kidbot's deploys for days).
          # Env-scoped so the fix travels with the repo, no admin needed.
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: "*"
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:DRAGONFLY_DIR)) {
            throw "DRAGONFLY_DIR Actions variable is not set. See deploy/README.md."
          }
          if ($env:EVENT_NAME -eq 'workflow_dispatch') { $ref = $env:INPUT_REF }
          else { $ref = $env:WORKFLOW_SHA }
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = 'origin/main' }
          Write-Host "Deploying ref: $ref"
          & "$env:DRAGONFLY_DIR\deploy\redeploy.ps1" -Ref $ref

      # Post-deploy synthetic smoke (ROADMAP Tier 2 #3): proves dragonfly-id serves valid OIDC
      # metadata + signing keys (what every app server's /auth/suite depends on), not just that
      # /health is up. Checks health + discovery (issuer/jwks_uri) + JWKS (>=1 key with a kid).
      # A non-zero exit fails the deploy run.
      - name: Post-deploy smoke
        shell: powershell
        env:
          DRAGONFLY_DIR: ${{ vars.DRAGONFLY_DIR }}
        run: |
          $ErrorActionPreference = "Stop"
          $proj = $env:DRAGONFLY_DIR
          # Run the smoke INSIDE the server container (python is there; the runner has no host python
          # on PATH), hitting dragonfly-id on its internal port 8000.
          docker compose -f "$proj\docker-compose.yml" cp "$proj\scripts\synthetic_smoke.py" server:/tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "copying smoke script into container failed" }
          docker compose -f "$proj\docker-compose.yml" exec -T -e DRAGONFLY_ID_URL=http://localhost:8000 server python /tmp/smoke.py
          if ($LASTEXITCODE -ne 0) { throw "post-deploy smoke FAILED" }

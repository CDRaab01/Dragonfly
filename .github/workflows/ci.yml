name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 09:00 UTC) so "green" stays meaningful between pushes.
    # This is the Android CI; Deploy watches "Server CI", not this, so no deploy can result.
    - cron: "0 9 * * 1"

# Tests + debug build on push/PR. Signed release publishing lives in release.yml (auto on main
# pushes that touch android/**). The Android jobs check the repo out into Dragonfly/ and the
# sibling Pulse repo into Pulse/, so the composite build's includeBuild("../../Pulse") resolves.

jobs:
  secret-scan:
    name: "Secret scan (gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so a secret in any past commit is caught
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source /repo --redact --no-banner

  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Dragonfly/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Dragonfly
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Dragonfly/android
    steps:
      - uses: actions/checkout@v7
        with:
          path: Dragonfly
      - uses: actions/checkout@v7
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: dragonfly-debug-${{ github.sha }}
          path: Dragonfly/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

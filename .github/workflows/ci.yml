name: CI

on:
  push:
    branches: ["main", "claude/**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# The Android jobs check the repo out into Dragonfly/ and the sibling Pulse repo into Pulse/, so
# the composite build's includeBuild("../../Pulse") (relative to Dragonfly/android) resolves inside
# the workspace (Cookbook precedent). Pulse is public, so the default token suffices; if it ever
# goes private, give those checkout steps a PAT via `token:`.

jobs:
  android-test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: Dragonfly/android
    steps:
      - uses: actions/checkout@v4
        with:
          path: Dragonfly
      - uses: actions/checkout@v4
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  android-build:
    name: "Android — Assemble Debug APK"
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Dragonfly/android
    steps:
      - uses: actions/checkout@v4
        with:
          path: Dragonfly
      - uses: actions/checkout@v4
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: dragonfly-debug-${{ github.sha }}
          path: Dragonfly/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # On a v* tag, build a signed release APK and publish it to a GitHub Release. Signs with the CI
  # release key when the KEYSTORE_* secrets are set; otherwise falls back to the committed stable
  # key (build.gradle), so a tag always produces an installable, identity-stable APK. Dragonfly
  # self-updates through this exact release (it lists itself as a managed app).
  android-release-build:
    name: "Android — Assemble Release APK"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: android-test
    defaults:
      run:
        working-directory: Dragonfly/android
    steps:
      - uses: actions/checkout@v4
        with:
          path: Dragonfly
      - uses: actions/checkout@v4
        with:
          repository: CDRaab01/Pulse
          path: Pulse
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_name }}
        run: |
          # Use the CI release key only when the secret is present; otherwise build.gradle falls
          # back to the committed stable key (KEYSTORE_PATH unset).
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
            export KEYSTORE_PATH=keystore.jks
            echo "Signing with the CI release key."
          else
            echo "No KEYSTORE_BASE64 secret; signing with the committed stable key."
          fi
          ./gradlew :app:assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: dragonfly-release-${{ github.sha }}
          path: Dragonfly/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  publish:
    name: "Publish — GitHub Release"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [android-release-build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dragonfly-release-${{ github.sha }}
          path: dist
      - name: Rename APK with version tag
        run: mv dist/app-release.apk dist/dragonfly-${{ github.ref_name }}.apk
      # Dragonfly consumes this asset itself for self-updates — same contract it expects from
      # every sibling: versionCode (the API only exposes the tag) + sha256 integrity hash.
      - name: Generate version.json for Dragonfly
        run: |
          SHA256=$(sha256sum dist/dragonfly-${{ github.ref_name }}.apk | cut -d' ' -f1)
          printf '{"versionCode": %d, "versionName": "%s", "sha256": "%s", "minSdk": 26}\n' \
            "${{ github.run_number }}" "${{ github.ref_name }}" "$SHA256" > dist/version.json
          cat dist/version.json
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/dragonfly-${{ github.ref_name }}.apk
            dist/version.json
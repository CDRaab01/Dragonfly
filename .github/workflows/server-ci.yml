name: Server CI

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["server/**", ".github/workflows/server-ci.yml"]
  pull_request:
    branches: ["main"]
    paths: ["server/**", ".github/workflows/server-ci.yml"]
  workflow_dispatch:
  schedule:
    # Weekly bit-rot check (Mondays 09:30 UTC). `schedule` ignores the `paths` filter, so this
    # runs the full server suite. Deploy is guarded on `workflow_run.event == 'push'`
    # (deploy.yml), so this weekly run never triggers a redeploy.
    - cron: "30 9 * * 1"

jobs:
  lint:
    name: "Server — Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check app
        working-directory: server
      - run: ruff format --check app
        working-directory: server

  test:
    name: "Server — Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dragonfly_id
          POSTGRES_PASSWORD: dragonfly_id
          POSTGRES_DB: dragonfly_id_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://dragonfly_id:dragonfly_id@localhost:5432/dragonfly_id_test
      SECRET_KEY: ci-test-secret-not-for-production
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/pyproject.toml
      - run: pip install -e ".[dev]"
      # Migration smoke test: the schema must apply cleanly from scratch.
      - run: alembic upgrade head
      - run: pytest tests/ -v --tb=short
